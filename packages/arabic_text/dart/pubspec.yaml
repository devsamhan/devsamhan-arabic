name: arabic_text
description: >-
  Arabic text normalization — tashkeel, alef, hamza, ya, ta marbouta, search
  keys, sort keys. Zero dependencies. Conformant with devsamhan-arabic spec
  v1.0.0.
version: 1.0.0

homepage: https://github.com/devsamhan/devsamhan-arabic
repository: https://github.com/devsamhan/devsamhan-arabic
issue_tracker: https://github.com/devsamhan/devsamhan-arabic/issues

topics:
  - arabic
  - normalization
  - search
  - flutter
  - rtl

environment:
  sdk: '>=3.0.0 <4.0.0'

dev_dependencies:
  test: ^1.25.0
