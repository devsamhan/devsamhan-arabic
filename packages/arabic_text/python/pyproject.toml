[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "devsamhan-arabic-text"
version = "1.0.0"
description = "Arabic text normalization — tashkeel, alef, hamza, search keys, sorting"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    { name = "devsamhan", email = "alsamhan2015@gmail.com" },
]
keywords = ["arabic", "nlp", "text-normalization", "search", "unicode"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Natural Language :: Arabic",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Text Processing :: Linguistic",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/devsamhan/devsamhan-arabic"
Repository = "https://github.com/devsamhan/devsamhan-arabic"
"Issue Tracker" = "https://github.com/devsamhan/devsamhan-arabic/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["devsamhan_arabic_text*"]
