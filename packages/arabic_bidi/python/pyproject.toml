[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "devsamhan-arabic-bidi"
version = "1.0.0"
description = "Arabic terminal reshaping and BiDi — devsamhan-arabic spec v1.0.0"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "devsamhan", email = "alsamhan2015@gmail.com" }]
keywords = ["arabic", "bidi", "rtl", "terminal", "reshaping", "unicode"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Natural Language :: Arabic",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/devsamhan/devsamhan-arabic"
Repository = "https://github.com/devsamhan/devsamhan-arabic"
"Issue Tracker" = "https://github.com/devsamhan/devsamhan-arabic/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["devsamhan_arabic_bidi*"]
